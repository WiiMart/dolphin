name: Dolphin Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution (Release)
        shell: cmd
        run: |
          nuget restore Source\dolphin-emu.sln
          msbuild Source\dolphin-emu.sln /p:Configuration=Release /p:Platform=x64

      - name: Create Default Config
        shell: bash
        run: |
          mkdir -p Binary/x64/User/Config
          echo "[AutoUpdate]" > Binary/x64/User/Config/Dolphin.ini
          echo "UpdateTrack = wiimart-windows" >> Binary/x64/User/Config/Dolphin.ini

      - name: Compress Artifacts
        shell: cmd
        run: |
          mkdir output
          xcopy /s /y "Binary\x64\" output\
          7z a windows-build_x64.zip .\output\*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build_x64
          path: windows-build_x64.zip

      - name: Trigger Update Server
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          curl -X POST "https://updates.wiimart.org/deploy/windows/${{ secrets.UPDATER_DEPLOY_SECRET }}/${{ github.run_id }}"

  linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgtk2.0-dev libsdl2-dev libxi-dev libxrandr-dev libudev-dev qt6-base-dev qt6-base-private-dev libqt6svg6-dev zip

      - name: Build Portable (Release)
        run: |
          mkdir Build
          cd Build
          cmake .. -DLINUX_LOCAL_DEV=true -DCMAKE_BUILD_TYPE=Release
          make -j $(nproc)
          cp -r ../Data/Sys/ Binaries/
          touch Binaries/portable.txt

      - name: Compress Artifacts
        run: |
          cd Build/Binaries
          zip -r ../../linux-build_x64.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build_x64
          path: linux-build_x64.zip

  macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x64
            platform: mac-x64
          - os: macos-latest
            arch: arm64
            platform: mac-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies (Qt6)
        run: |
          brew update
          brew install qt@6
          brew install pkg-config

      - name: Build Bundle (Release)
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6)
          make -j $(sysctl -n hw.logicalcpu)
      - name: Bundle Qt Frameworks
        run: |
          $(brew --prefix qt@6)/bin/macdeployqt build/Binaries/Dolphin.app
          
      - name: Create Default Config
        run: |
          mkdir -p build/Binaries/Dolphin.app/Contents/Resources/User/Config
          echo "[AutoUpdate]" > build/Binaries/Dolphin.app/Contents/Resources/User/Config/Dolphin.ini
          echo "UpdateTrack = wiimart-mac-${{ matrix.arch }}" >> build/Binaries/Dolphin.app/Contents/Resources/User/Config/Dolphin.ini

      - name: Compress Artifacts
        run: |
          cd build/Binaries
          zip -r ../../macos-build_${{ matrix.arch }}.zip Dolphin.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build_${{ matrix.arch }}
          path: macos-build_${{ matrix.arch }}.zip

      - name: Trigger Update Server
        if: github.event_name != 'pull_request'
        run: |
          curl -X POST "https://updates.wiimart.org/deploy/${{ matrix.platform }}/${{ secrets.UPDATER_DEPLOY_SECRET }}/${{ github.run_id }}"

  android:
    name: Android (ARM64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Release Keystore
        run: |
          curl "https://fdroid.wiimart.org/keystore/${{ secrets.FDROID_SECRET }}" -o Source/Android/app/release.jks
      
      - name: Verify Keystore
        run: |
          keytool -list -keystore Source/Android/app/release.jks -storepass ${{ secrets.STORE_PASSWORD }}
      
      - name: Build APK (Release)
        working-directory: ./Source/Android
        env:
          RELEASE_STORE_FILE: release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Compress Artifacts
        run: |
          find Source/Android/app/build/outputs/apk/release -name "*.apk" -exec zip -j android-build_arm64.zip {} +

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build_arm64
          path: android-build_arm64.zip

      - name: Trigger F-Droid Update
        if: github.event_name != 'pull_request'
        run: |
          curl "https://fdroid.wiimart.org/web/hook/${{ secrets.FDROID_SECRET }}/${{ github.run_id }}"
